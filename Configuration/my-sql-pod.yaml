---
apiVersion: v1 
kind: Pod
metadata: 
     name: mysql-pod
spec:
   containers:
    - name: mysql
      image: mysql:latest
      env:
      - name: MYSQL_ROOT_PASSWORD
        value: "password"
      - name: MYSQL_DATABSE
        value: mydb
      - name: MYSQL_USER
        value: myuser
      - name: MYSQL_PASSWORD
        value: "mypassword"
      ports:
      - containerPort: 3306
